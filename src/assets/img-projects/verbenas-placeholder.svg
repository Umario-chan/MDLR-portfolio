<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#f0f4f0"/>
  <rect width="800" height="480" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Leaf icon -->
  <g transform="translate(400,200)" opacity="0.35">
    <path d="M0,-80 C40,-80 80,-40 80,20 C80,70 40,100 0,100 C-40,100 -80,70 -80,20 C-80,-40 -40,-80 0,-80 Z" fill="#4a7c4a"/>
    <line x1="0" y1="-80" x2="0" y2="100" stroke="#4a7c4a" stroke-width="4"/>
    <path d="M0,0 C20,-20 50,-30 80,20" fill="none" stroke="#4a7c4a" stroke-width="3"/>
    <path d="M0,30 C-20,10 -50,0 -80,20" fill="none" stroke="#4a7c4a" stroke-width="3"/>
  </g>
  <!-- Coming soon text -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="4" fill="#4a7c4a" opacity="0.6">COMING SOON</text>
</svg>
